name: Build and Push Docker Images

on:
  # Run weekly on Mondays at midnight UTC
  schedule:
    - cron: '0 0 * * 1'
  # Allow manual trigger
  workflow_dispatch:
  # Build on push to main
  push:
    branches:
      - main
    paths:
      - 'redis-sentinel/**'
      - 'haproxy/**'
      - 'common/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/build-and-push.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  # Which major version gets the "latest" tag
  LATEST_REDIS_MAJOR: 8
  REDIS_DISTRO: "bookworm"
  HAPROXY_VERSION: "3.2"
  # No suffix - publish to regular tags
  BETA_SUFFIX: ''

jobs:
  # Detect which components changed to avoid unnecessary builds
  changes:
    runs-on: ubuntu-latest
    outputs:
      redis-sentinel: ${{ steps.filter.outputs.redis-sentinel }}
      haproxy: ${{ steps.filter.outputs.haproxy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            redis-sentinel:
              - 'redis-sentinel/**'
              - 'common/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/build-and-push.yml'
            haproxy:
              - 'haproxy/**'
              - 'common/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - '.github/workflows/build-and-push.yml'

  # Build Rust binary for redis-sentinel (AMD64 - bookworm, native, fast ~2-3min)
  # The binary is version-agnostic — one build covers all Redis major versions.
  build-rust-binaries-redis-sentinel-amd64:
    needs: changes
    if: ${{ needs.changes.outputs['redis-sentinel'] == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push rust binaries for redis-sentinel amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./redis-sentinel/Dockerfile
          target: rust-builder-local-output
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/redis-sentinel-rust-binaries:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/redis-sentinel-rust-binaries:latest
          cache-to: type=inline

  # Build Rust binary for haproxy (AMD64 - alpine, native, fast ~2-3min)
  build-rust-binaries-haproxy-amd64:
    needs: changes
    if: ${{ needs.changes.outputs.haproxy == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push rust binaries for haproxy amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./haproxy/Dockerfile
          target: rust-builder-local-output
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/haproxy-rust-binaries:latest
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/haproxy-rust-binaries:latest
          cache-to: type=inline

  # Build redis-sentinel for AMD64 (one image per Redis major version)
  build-redis-sentinel-amd64:
    needs: [changes, build-rust-binaries-redis-sentinel-amd64]
    if: ${{ needs.changes.outputs['redis-sentinel'] == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        redis_major: [7, 8]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push redis-sentinel for amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./redis-sentinel/Dockerfile
          build-args: REDIS_VERSION=${{ matrix.redis_major }}
          build-contexts: |
            rust-binaries=docker-image://${{ env.IMAGE_PREFIX }}/redis-sentinel-rust-binaries:latest
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/redis-sentinel:${{ matrix.redis_major }}${{ env.BETA_SUFFIX }}
            ${{ env.IMAGE_PREFIX }}/redis-sentinel:${{ matrix.redis_major }}-${{ env.REDIS_DISTRO }}${{ env.BETA_SUFFIX }}
            ${{ env.IMAGE_PREFIX }}/redis-sentinel:${{ matrix.redis_major }}-${{ steps.sha.outputs.short }}${{ env.BETA_SUFFIX }}
            ${{ matrix.redis_major == env.LATEST_REDIS_MAJOR && format('{0}/redis-sentinel:latest{1}', env.IMAGE_PREFIX, env.BETA_SUFFIX) || '' }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/redis-sentinel:${{ matrix.redis_major }}
          cache-to: type=inline

  # Build haproxy image for AMD64
  build-haproxy-amd64:
    needs: [changes, build-rust-binaries-haproxy-amd64]
    if: ${{ needs.changes.outputs.haproxy == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get short SHA and version parts
        id: meta
        run: |
          echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "major=$(echo ${{ env.HAPROXY_VERSION }} | cut -d. -f1)" >> $GITHUB_OUTPUT

      - name: Build and push haproxy for amd64
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./haproxy/Dockerfile
          build-args: HAPROXY_VERSION=${{ env.HAPROXY_VERSION }}
          build-contexts: |
            rust-binaries=docker-image://${{ env.IMAGE_PREFIX }}/haproxy-rust-binaries:latest
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/haproxy:latest${{ env.BETA_SUFFIX }}
            ${{ env.IMAGE_PREFIX }}/haproxy:${{ env.HAPROXY_VERSION }}-alpine${{ env.BETA_SUFFIX }}
            ${{ env.IMAGE_PREFIX }}/haproxy:${{ env.HAPROXY_VERSION }}${{ env.BETA_SUFFIX }}
            ${{ env.IMAGE_PREFIX }}/haproxy:${{ steps.meta.outputs.major }}${{ env.BETA_SUFFIX }}
            ${{ env.IMAGE_PREFIX }}/haproxy:${{ env.HAPROXY_VERSION }}-${{ steps.meta.outputs.short }}${{ env.BETA_SUFFIX }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}/haproxy:latest
          cache-to: type=inline
